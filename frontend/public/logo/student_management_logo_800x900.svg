<svg width="800" height="900" viewBox="0 0 800 900" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Student Management System Logo</title>
  <desc id="desc">Minimal dark navy teal brand logo with emerald hexagon, neon glow border, centered graduation cap, SMS and tagline.</desc>

  <rect width="800" height="900" fill="#0d1f2d" />

  <defs>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%" filterUnits="objectBoundingBox">
      <feGaussianBlur in="SourceAlpha" stdDeviation="12" result="blur" />
      <feFlood flood-color="#5df3d0" flood-opacity="0.45" result="glowColor" />
      <feComposite in="glowColor" in2="blur" operator="in" result="coloredGlow" />
      <feMerge>
        <feMergeNode in="coloredGlow" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <polygon points="240,170 480,170 560,308.5 480,447 240,447 160,308.5" fill="#0a1e2e" />
  <polygon points="240,170 480,170 560,308.5 480,447 240,447 160,308.5"
           fill="none"
           stroke="#10b981"
           stroke-width="4"
           stroke-linejoin="round"
           filter="url(#glow)" />

  <g id="cap" transform="translate(400,310)">
    <polygon points="-120,-30 120,10 80,50 -160,10" fill="#10b981" />
    <path d="M-20,20 L-20,70" stroke="#10b981" stroke-width="16" stroke-linecap="round" />
    <path d="M100,20 C110,50 108,70 90,90" stroke="#10b981" stroke-width="10" stroke-linecap="round" fill="none" />
    <path d="M90,90 L74,102" stroke="#10b981" stroke-width="10" stroke-linecap="round" fill="none" />
  </g>

  <text x="400" y="540" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="140" font-weight="900" letter-spacing="3" fill="#ffffff">SMS</text>
  <text x="400" y="610" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="400" letter-spacing="2" fill="#10b981">Educate · Manage · Grow</text>
</svg>
