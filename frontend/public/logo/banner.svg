<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="400" viewBox="0 0 1200 400" role="img" aria-label="Student Management System logo banner">
  <!-- Canvas background with corner radius -->
  <rect width="1200" height="400" rx="24" ry="24" fill="#0f2744" />

  <!-- Safe zone margin 80px -->
  <!-- Icon group (hexagon + cap) positioned at x=80,y=center -->
  <g id="icon" transform="translate(80,0)">
    <!-- center at (100,200) within this group -->
    <g transform="translate(100,200)">
      <!-- Regular hexagon sized to approx 200x200 -->
      <path d="M100 0 L50 86.6025 L-50 86.6025 L-100 0 L-50 -86.6025 L50 -86.6025 Z" fill="#0f2744" />
      <!-- Graduation cap (emerald) centered inside hexagon -->
      <g transform="translate(0,0) scale(1)">
        <!-- Mortarboard (diamond-like) -->
        <path d="M0 -30 L80 0 L0 30 L-80 0 Z" fill="#10b981" />
        <!-- Cap base (rectangle under mortarboard) -->
        <rect x="-40" y="25" width="80" height="14" rx="3" ry="3" fill="#10b981" />
        <!-- Tassel -->
        <path d="M60 0 C68 10, 68 30, 40 40" stroke="#0f2744" stroke-width="6" fill="none" stroke-linecap="round" />
        <circle cx="40" cy="40" r="5" fill="#10b981" />
      </g>
    </g>
  </g>

  <!-- Text stack positioned to the right of icon -->
  <!-- Icon left at x=80, width=200 -> text start x = 80 + 200 + 40 = 320 -->
  <g id="text" transform="translate(320,0)">
    <!-- Balanced vertical centering within 80px safe zone -->
    <text x="0" y="140" font-family="Inter, Arial, sans-serif" font-weight="700" font-size="72" fill="#ffffff">Student Management</text>
    <text x="0" y="220" font-family="Inter, Arial, sans-serif" font-weight="700" font-size="72" fill="#10b981">System</text>
    <text x="0" y="308" font-family="Inter, Arial, sans-serif" font-weight="300" font-size="40" fill="rgba(255,255,255,0.6)" letter-spacing="4">Educate · Manage · Grow</text>
  </g>

</svg>
